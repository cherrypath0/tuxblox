.build-linux:
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  image: $CI_REGISTRY/wine/vkd3d:debian-trixie
  interruptible: true
  needs:
    - job: image-linux
      optional: true
  dependencies: []
  script:
    - git config --global --add safe.directory $CI_PROJECT_DIR
    - git clean -fdx
    - git reset --hard
    - rm -fr .git/rebase-merge
    - mkdir artifacts
    - cat /proc/cpuinfo > artifacts/cpuinfo.txt
    - cat /proc/meminfo > artifacts/meminfo.txt
    - vulkaninfo > artifacts/vulkaninfo.txt
    - git rebase $CI_MERGE_REQUEST_DIFF_BASE_SHA --exec ./gitlab/build-linux
    - if [ -f build_failed ] ; then exit 1 ; fi
    - if [ -f tests_failed ] ; then exit 2 ; fi
  artifacts:
    when: always
    paths:
      - artifacts

build-radv-64:
  extends: .build-linux
  tags:
    - amd-gpu
  variables:
    VK_LOADER_DRIVERS_SELECT: 'radeon_*'
    VKD3D_SHADER_CONFIG: 'force_validation'
    VKD3D_TEST_DEBUG: '1'

build-llvmpipe-64:
  extends: .build-linux
  variables:
    VK_LOADER_DRIVERS_SELECT: 'lvp_*'
    VKD3D_SHADER_CONFIG: 'force_validation'
    VKD3D_TEST_DEBUG: '1'

build-radv-32:
  extends: .build-linux
  tags:
    - amd-gpu
  variables:
    VK_LOADER_DRIVERS_SELECT: 'radeon_*'
    CC: 'i686-linux-gnu-gcc'
    VKD3D_SHADER_CONFIG: 'force_validation'
    VKD3D_TEST_DEBUG: '1'

build-llvmpipe-32:
  extends: .build-linux
  variables:
    VK_LOADER_DRIVERS_SELECT: 'lvp_*'
    CC: 'i686-linux-gnu-gcc'
    VKD3D_SHADER_CONFIG: 'force_validation'
    VKD3D_TEST_DEBUG: '1'

